<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>XXIV Feria de Oficios Perdidos · Lituénigo</title>
  <meta name="description" content="XXIV Feria de Oficios Perdidos de Lituénigo: programa, mapa de puestos, portada oficial y cómo llegar con Google Maps.">
  <link rel="canonical" href="./index_oficios_lituenigo.html">
  <style>
    html,body{margin:0;min-height:100%;background:#fff4dc;color:#24150d;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    #loader{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    #loader a{display:inline-flex;margin-top:16px;padding:13px 18px;border-radius:999px;background:#8f3f18;color:#fff;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div id="loader">
    <main>
      <h1>XXIV Feria de Oficios Perdidos · Lituénigo</h1>
      <p>Cargando programa digital…</p>
      <a href="./index_oficios_lituenigo.html">Abrir la página directa</a>
    </main>
  </div>
  <script>
    (async function(){
      const footer = `
<style>
  .chispa-credit{background:#120b08;color:#e9d2a7;border-top:1px solid rgba(255,226,168,.25);padding:22px 18px;text-align:center;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
  .chispa-credit__inner{width:min(1100px,calc(100% - 24px));margin:auto;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .chispa-credit__text{color:#c9ad7a;font-size:.92rem;line-height:1.35}
  .chispa-credit__logo{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,226,168,.18);text-decoration:none;transition:.18s ease}
  .chispa-credit__logo img{display:block;width:190px;max-width:58vw;height:auto}
  .chispa-credit__logo:hover{filter:brightness(1.08);transform:translateY(-1px)}
</style>
<footer class="chispa-credit" aria-label="Créditos de digitalización">
  <div class="chispa-credit__inner">
    <span class="chispa-credit__text">Digitalización del programa y adaptación web:</span>
    <a class="chispa-credit__logo" href="https://educandoconchispa.com" target="_blank" rel="noopener" title="Educando con chIspA">
      <img src="./assets/logo.svg" alt="Educando con chIspA">
    </a>
  </div>
</footer>`;
      try{
        const response = await fetch('./index_oficios_lituenigo.html', {cache:'no-store'});
        if(!response.ok) throw new Error('No se pudo cargar la página final');
        let html = await response.text();
        html = html.replace('</body>', footer + '\n</body>');
        document.open();
        document.write(html);
        document.close();
      }catch(error){
        document.getElementById('loader').innerHTML = '<main><h1>XXIV Feria de Oficios Perdidos · Lituénigo</h1><p>No se ha podido cargar automáticamente.</p><a href="./index_oficios_lituenigo.html">Abrir la página directa</a></main>';
      }
    })();
  </script>
</body>
</html>
